<!DOCTYPE html>
<html>
<head>
    <title>QR Code - Luxury Looks Salon</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #f8fafc; margin: 0; }
        .card { background: white; border-radius: 24px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; max-width: 400px; }
        h1 { color: #1e293b; font-size: 24px; margin: 0 0 8px; }
        p { color: #64748b; font-size: 14px; margin: 0 0 24px; }
        canvas { border-radius: 16px; }
        .url { margin-top: 20px; padding: 12px 16px; background: #f1f5f9; border-radius: 12px; font-family: monospace; font-size: 13px; color: #475569; word-break: break-all; }
        .badge { display: inline-block; margin-top: 16px; padding: 6px 16px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; border-radius: 20px; font-size: 12px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Luxury Looks Salon</h1>
        <p>Scan this QR code to view services and book appointments</p>
        <canvas id="qr"></canvas>
        <div class="url">http://localhost:5173/s/luxury-looks-salon</div>
        <div class="badge">Customer Portal</div>
    </div>
    <script>
        QRCode.toCanvas(document.getElementById('qr'), 'http://localhost:5173/s/luxury-looks-salon', {
            width: 256,
            margin: 2,
            color: { dark: '#1e293b', light: '#ffffff' }
        });
    </script>
</body>
</html>
